services:
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: apple333, POSTGRES_USER: apple333, POSTGRES_PASSWORD: change-me }
    ports: ["127.0.0.1:5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U apple333 -d apple333"], interval: 5s, timeout: 3s, retries: 10 }
  redis:
    image: redis:7-alpine
    ports: ["127.0.0.1:6379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 10 }
volumes: { postgres_data: {} }
