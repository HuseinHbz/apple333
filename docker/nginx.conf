server {
  listen 80;
  server_name _;
  client_max_body_size 1m;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  location / { proxy_pass http://app:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
}
