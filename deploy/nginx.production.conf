map $http_upgrade $apple333_connection_upgrade {
  default upgrade;
  '' close;
}

map $http_x_forwarded_proto $apple333_forwarded_proto {
  default $http_x_forwarded_proto;
  '' $scheme;
}

# This nginx is loopback-only. Accept client addressing solely from the
# host-local TLS edge, then overwrite forwarded headers before the app sees it.
# Do not publish this container or add another trusted CIDR without reviewing
# the edge topology and the application rate-limit trust boundary.
real_ip_header X-Forwarded-For;
set_real_ip_from 127.0.0.1;
set_real_ip_from ::1;
real_ip_recursive off;

limit_req_zone $binary_realip_remote_addr zone=apple333_api:10m rate=30r/s;

server {
  listen 80;
  server_name _;
  client_max_body_size 10m;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Prometheus reaches app:3000 directly on the private Docker network.
  # Keeping this route unreachable through nginx prevents public metric leaks.
  location = /api/metrics {
    return 404;
  }

  location ^~ /api/ {
    limit_req zone=apple333_api burst=60 nodelay;
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $realip_remote_addr;
    proxy_set_header X-Forwarded-For $realip_remote_addr;
    proxy_set_header X-Forwarded-Proto $apple333_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $apple333_connection_upgrade;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  location /_next/static/ {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $apple333_forwarded_proto;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $realip_remote_addr;
    proxy_set_header X-Forwarded-For $realip_remote_addr;
    proxy_set_header X-Forwarded-Proto $apple333_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $apple333_connection_upgrade;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
