global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: apple333-app
    metrics_path: /api/metrics
    static_configs:
      - targets: [app:3000]

  - job_name: apple333-prometheus
    static_configs:
      - targets: [localhost:9090]
