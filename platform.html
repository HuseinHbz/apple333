<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>اَپل‌خانه | پنل عملیات</title>
    <link rel="stylesheet" href="platform.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="index.html"><span>●</span> اَپل‌خانه</a>
        <p class="environment">OPERATION CONSOLE <i>LIVE DEMO</i></p>
        <nav id="side-nav">
          <button class="active" data-view="dashboard">▦ داشبورد</button>
          <p>تجارت</p><button data-view="catalog">◈ کالا و کاتالوگ</button><button data-view="inventory">⌑ انبار و شعب</button><button data-view="orders">▣ سفارش‌ها</button>
          <p>امور مشتری</p><button data-view="installments">◷ اقساط</button><button data-view="tradein">⇄ تعویض گوشی</button><button data-view="customers">◉ مشتریان و CRM</button>
          <p>مدیریت</p><button data-view="insights">◒ گزارش و قیمت</button><button data-view="content">✦ محتوا و بازاریابی</button><button data-view="support">? پشتیبانی</button><button data-view="settings">⚙ تنظیمات و امنیت</button>
        </nav>
        <div class="sidebar-bottom"><span class="avatar">هـ</span><div><b id="user-name">مدیر سیستم</b><small id="user-role">Admin</small></div><button id="logout" title="خروج">↩</button></div>
      </aside>
      <main class="workspace">
        <header class="topbar"><button class="mobile-menu" id="mobile-menu">☰</button><div><p id="page-kicker">OVERVIEW</p><h1 id="page-title">صبح بخیر، حسین</h1></div><div class="top-actions"><button id="notifications">◌<i>۳</i></button><button class="new-action" id="new-action">+ عملیات جدید</button></div></header>
        <section id="view-root"></section>
      </main>
    </div>
    <dialog id="action-dialog"><form method="dialog"><button class="close" value="cancel">×</button><div id="dialog-content"></div></form></dialog>
    <div class="toast" id="toast"></div>
    <script src="platform.js"></script>
  </body>
</html>
